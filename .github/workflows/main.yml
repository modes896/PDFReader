name: Notarize Local Build

on:
  release:
    types: [published]

jobs:
  notarize:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download unsigned app zip from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist

          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*unsigned*.zip" \
            --dir dist

          ls -la dist

      - name: Unzip app
        run: |
          mkdir -p unsigned
          unzip dist/*unsigned*.zip -d unsigned
          find unsigned -maxdepth 3 -name "*.app"

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "" build.keychain

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH=$(find unsigned -maxdepth 3 -name "*.app" | head -n 1)

          codesign --force --deep --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Zip signed app for notarization
        run: |
          APP_PATH=$(find unsigned -maxdepth 3 -name "*.app" | head -n 1)
          ditto -c -k --keepParent "$APP_PATH" signed-app.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit signed-app.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple app
        run: |
          APP_PATH=$(find unsigned -maxdepth 3 -name "*.app" | head -n 1)
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Create final DMG
        env:
          APP_NAME: PDFReader
        run: |
          APP_PATH=$(find unsigned -maxdepth 3 -name "*.app" | head -n 1)

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$APP_PATH" \
            -ov \
            -format UDZO \
            "$APP_NAME.dmg"

      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APP_NAME: PDFReader
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$APP_NAME.dmg"
          codesign --verify --verbose=2 "$APP_NAME.dmg"

      - name: Upload final DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_NAME: PDFReader
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "$APP_NAME.dmg" \
            --repo "${{ github.repository }}" \
            --clobber
