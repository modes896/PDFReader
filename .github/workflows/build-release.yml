name: Release macOS

on:
  push:
    tags:
      - "v*"

jobs:
  build-sign:
    name: Build and Sign macOS App
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --bundles app
        env:
          CI: true

      - name: Sign app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="$(find src-tauri/target/release/bundle/macos -maxdepth 2 -name "*.app" -type d | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Signing: $APP_PATH"

          codesign --force --deep --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Upload signed app artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-macos-artifacts
          path: src-tauri/target/release/bundle/macos/*.app

  notarize-release:
    name: Notarize and Release macOS App
    needs: build-sign
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Download signed app
        uses: actions/download-artifact@v4
        with:
          name: signed-macos-artifacts
          path: artifacts

      - name: Zip app for notarization
        run: |
          APP_PATH="$(find artifacts -name "*.app" -type d | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

          ditto -c -k --keepParent "$APP_PATH" app-notarize.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit app-notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait

          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Create final app zip
        run: |
          ditto -c -k --keepParent "$APP_PATH" "FancyPlayer-macOS.app.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: FancyPlayer-macOS.app.zip
